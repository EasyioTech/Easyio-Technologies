services:
  app:
    build:
      context: .
      target: deps # Uses the initial stage with full node_modules and devDependencies
    command: npm run dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true # Enables hot-reloading on Windows/Docker volumes
    ports:
      - "3000:3000"
